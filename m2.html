<!DOCTYPE html>
<html>
<head>
<title>MAYA Beauty & Fashion</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<style>

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:black;
    color:white;
}

.hero{
    height:100vh;
    background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
    url('https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9');
    background-size:cover;
    background-position:center;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1{
    font-family: 'Playfair Display', serif;
    font-size:50px;
    color:gold;
    letter-spacing:3px;
}

.hero p{
    font-size:20px;
    color:#ddd;
}

.btn{
    margin-top:20px;
    padding:12px 30px;
    background:gold;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

.section{
    padding:60px 20px;
    text-align:center;
}

.section h2{
    color:gold;
    margin-bottom:40px;
}

.services{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.card{
    background:#111;
    border:2px solid gold;
    padding:20px;
    width:200px;
    border-radius:10px;
    transition:0.3s;
}

.card:hover{
    background:gold;
    color:black;
    transform:scale(1.05);
}

.gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
}

.gallery img{
    width:300px;
    border:3px solid gold;
    border-radius:10px;
}

form{
    max-width:400px;
    margin:auto;
    display:flex;
    flex-direction:column;
    gap:15px;
}

input, textarea{
    padding:10px;
    border:none;
}

button{
    background:gold;
    border:none;
    padding:12px;
    cursor:pointer;
    font-weight:bold;
}

.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    padding:15px;
    border-radius:50%;
    font-size:20px;
    text-decoration:none;
}

footer{
    text-align:center;
    padding:20px;
    background:#000;
    color:#888;
}

</style>
</head>
<body>

<div class="hero">
<h1>MAYA Beauty & Fashion</h1>
<p>Luxury Bridal Makeup | Mehndi | Nails</p>
<a href="tel:9990383595">
<button class="btn">Call Now</button>
</a>
</div>

<div class="section">
<h2>Our Services</h2>
<div class="services">
<div class="card">Makeup</div>
<div class="card">Mehndi</div>
<div class="card">Nails</div>
<div class="card">Hair</div>
<div class="card">Skin</div>
<div class="card">Eyelashes</div>
<div class="card">Event Planning</div>
</div>
</div>

<div class="section">
<h2>Gallery</h2>
<div class="gallery">
<img src="https://images.unsplash.com/photo-1517841905240-472988babdf9">
<img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9">
<img src="https://images.unsplash.com/photo-1487412912498-0447578fcca8">
</div>
</div>

<div class="section">
<h2>Book Appointment</h2>
<form>
<input type="text" placeholder="Your Name" required>
<input type="tel" placeholder="Phone Number" required>
<textarea placeholder="Your Requirement"></textarea>
<button type="submit">Submit</button>
</form>
</div>

<footer>
© 2026 MAYA Beauty & Fashion | Designed by Pawan
</footer>

<a class="whatsapp" href="https://wa.me/919990383595">💬</a>

</body>
</html>
